# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build CI

on:
  push:
    branches: [ "nx" ]
  pull_request:
    branches: [ "nx" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build API
        run: npx nx run api:build:production

      - name: Build Auth Client
        run: npx nx run auth-client:build

      - name: Build UI Client
        run: npx nx run client:build

      - name: Build Firebase Admin
        run: npx nx run firebase:build

      - name: Build MS Auth
        run: npx nx run auth:build:production

      - name: Build Types
        run: npx nx run types:build

      - name: Build Utils
        run: npx nx run utils:build
