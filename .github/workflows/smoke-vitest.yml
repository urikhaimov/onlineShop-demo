name: Vitest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: vitest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run Vitest (non-emulator)
        env:
          CI: 'true'
          NODE_ENV: 'test'
        run: npx vitest run apps/client/src/tests/stores apps/client/src/tests/components apps/client/src/tests/pages

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: |
            coverage/
            **/vitest-report.json
          if-no-files-found: ignore
