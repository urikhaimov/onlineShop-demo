name: Daily Vitest Smoke

on:
  workflow_dispatch: {}
  schedule:
    # 07:30 Asia/Jerusalem == 04:30 UTC
    - cron: '30 4 * * *'

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: smoke-vitest-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Speed up emulator startup across runs
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators

      - name: Install deps
        run: npm ci

      # Run only *.smoke.spec.* via dedicated config; provide safe env defaults
      - name: Run Vitest smoke
        env:
          CI: 'true'
          VITE_FIREBASE_API_KEY: 'test'
          VITE_FIREBASE_AUTH_DOMAIN: 'localhost'
          VITE_FIREBASE_PROJECT_ID: 'demo-smoke'
          VITE_FIREBASE_STORAGE_BUCKET: 'demo-smoke.appspot.com'
          VITE_FIREBASE_MESSAGING_SENDER_ID: '1234567890'
          VITE_FIREBASE_APP_ID: '1:123:web:abc'
          VITE_FIREBASE_MEASUREMENT_ID: 'G-SMOKE'
        run: |
          npx firebase-tools emulators:exec 'vitest run -c vitest.smoke.config.ts'

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-smoke-logs
          path: |
            **/vitest*.log
            firestore-debug.log
            storage-debug.log
          if-no-files-found: ignore

      - name: Create/Update issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = 'Daily Vitest Smoke failed';
            // Find existing open issue with this title
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'ci,smoke'
            });
            const existing = issues.data.find(i => i.title === title);

            const body = [
              `**Run:** https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
              `**Branch:** ${context.ref}`,
              `**Commit:** ${process.env.GITHUB_SHA}`,
              '',
              'Artifacts: `vitest-smoke-logs` (emulator logs).',
              '',
              '_This issue will auto-close on the next successful run._'
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['ci','smoke'] });
            }

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Daily Vitest Smoke"
            echo ""
            echo "**Status:** ${{ job.status }}"
            echo ""
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Branch: ${{ github.ref }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = 'Daily Vitest Smoke failed';
            const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: 'ci,smoke' });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
            }
