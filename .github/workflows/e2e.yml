name: E2E Tests (Playwright)

on:
  push:
    branches: [main, nx-refactor, develop]
    paths:
      - 'apps/client/**'
      - 'apps/client-e2e/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, nx-refactor]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      shard:
        description: 'Run a specific shard (e.g. 1/4)'
        required: false
        default: ''

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: ['1/4', '2/4', '3/4', '4/4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Copy env file
        run: |
          if [ -f .env.e2e ]; then cp .env.e2e .env; fi

      - name: Run Playwright tests (shard ${{ matrix.shard }})
        run: |
          npx playwright test \
            -c apps/client-e2e/playwright.config.ts \
            --shard=${{ matrix.shard }} \
            --project=chromium \
            --reporter=list,junit
        env:
          CI: true
          PW_HOST: 127.0.0.1
          PW_PORT: 5173
          VITE_DEMO_ADMIN: 'false'
          E2E: '1'
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ strategy.job-index }}
          path: |
            playwright-report/
            apps/client-e2e/playwright-report/
            test-results/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ strategy.job-index }}
          path: test-results/**/*.zip
          retention-days: 7

  # Merge shard reports into one
  report:
    name: Merge Reports
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-results-*
          merge-multiple: true
          path: all-reports/

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-reports
        continue-on-error: true

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30
